{% extends "base_public.html" %}
{% block title %}Create account — MedSynapse{% endblock %}
{% block content %}
<div class="panel" style="max-width:500px;">
  <h1 class="page-title" style="margin-bottom:0.5rem;">Create your account</h1>
  <p class="muted" style="margin-top:0;">All fields marked are required for provisioning.</p>
  <form method="post" action="{{ url_for('auth.register') }}">
    <input type="hidden" name="csrf_token" value="{{ csrf_token() }}"/>
    <div class="form-group">
      <label for="name">Full name</label>
      <input id="name" name="name" required/>
    </div>
    <div class="form-group">
      <label for="email">Email</label>
      <input id="email" name="email" type="email" required/>
    </div>
    <div class="form-group">
      <label for="phone">Phone</label>
      <input id="phone" name="phone" type="tel" placeholder="+1 …"/>
    </div>
    <div class="form-group">
      <label for="role">Role / function</label>
      <select id="role" name="role" required>
        <option value="clinician">Clinician</option>
        <option value="nurse">Nurse / care coordinator</option>
        <option value="researcher">Researcher</option>
        <option value="analyst">Health analyst</option>
        <option value="admin_ops">Operations</option>
      </select>
    </div>
    <div class="form-group">
      <label for="password">Password (min. 6 characters)</label>
      <input id="password" name="password" type="password" minlength="6" required/>
    </div>
    <button class="btn btn-primary" type="submit" style="width:100%;">Register</button>
  </form>
  <p class="muted" style="margin-top:1rem;">Already have access? <a href="{{ url_for('auth.login') }}">Sign in</a></p>
</div>
{% endblock %}
